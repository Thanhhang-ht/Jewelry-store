<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thêm/Sửa danh mục - Jewelry Store</title>

    <!-- CSS -->

    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="stylesheet" href="../css/category-form.css">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

    <div class="dashboard-container">

        <!-- ==========================
                SIDEBAR
        =========================== -->

        <aside class="sidebar">

            <div class="logo">

                <h1>Jewelry Store</h1>

                <p>ADMIN PANEL</p>

            </div>

            <hr>

            <ul class="sidebar-menu">

                <li>

                    <a href="dashboard.html">

                        <i class="fa-solid fa-house"></i>

                        Dashboard

                    </a>

                </li>

                <li>

                    <a href="product-management.html">

                        <i class="fa-solid fa-cube"></i>

                        Quản lý sản phẩm

                    </a>

                </li>

                <li class="active">

                    <a href="category-management.html">

                        <i class="fa-solid fa-table-list"></i>

                        Danh mục

                    </a>

                </li>

                <li>

                    <a href="order-management.html">

                        <i class="fa-solid fa-bag-shopping"></i>

                        Quản lý đơn hàng

                    </a>

                </li>

                <li>

                    <a href="customer-management.html">

                        <i class="fa-solid fa-user-group"></i>

                        Quản lý khách hàng

                    </a>

                </li>

                <li>

                    <a href="statistics.html">

                        <i class="fa-solid fa-chart-line"></i>

                        Thống kê

                    </a>

                </li>

                <li id="logoutBtn">

                    <a href="#">

                        <i class="fa-solid fa-right-from-bracket"></i>

                        Đăng xuất

                    </a>

                </li>

            </ul>

            <div class="sidebar-user">

                <div class="avatar">

                    <i class="fa-solid fa-user"></i>

                </div>

                <div class="user-info">

                    <h3 id="adminName">Admin</h3>

                    <span>Quản trị viên</span>

                </div>

                <i class="fa-solid fa-chevron-down"></i>

            </div>

        </aside>

        <!-- ==========================
                MAIN CONTENT
        =========================== -->

        <main class="main-content">

            <!-- ==========================
                    HEADER
            =========================== -->

            <header class="topbar">

                <div class="topbar-left">

                    <button class="menu-btn">

                        <i class="fa-solid fa-bars"></i>

                    </button>

                    <h2 id="formTitle">

                        Thêm danh mục

                    </h2>

                </div>

                <div class="topbar-right">

                    <button class="notification-btn">

                        <i class="fa-regular fa-bell"></i>

                    </button>

                </div>

            </header>

            <!-- ==========================
                    CATEGORY FORM
            =========================== -->
            <section class="category-form-container">

                <form id="categoryForm" class="category-form">

                    <!-- ==========================
                            LEFT
                    =========================== -->

                    <div class="form-left">

                        <h3>Thông tin danh mục</h3>

                        <!-- Tên danh mục -->

                        <div class="form-group">

                            <label for="categoryName">

                                Tên danh mục <span>*</span>

                            </label>

                            <input type="text" id="categoryName" name="categoryName" placeholder="Nhập tên danh mục..."
                                required>

                        </div>

                        <!-- Mô tả -->

                        <div class="form-group">

                            <label for="description">

                                Mô tả

                            </label>

                            <textarea id="description" name="description" rows="6"
                                placeholder="Nhập mô tả..."></textarea>

                        </div>

                        <!-- Trạng thái -->

                        <div class="form-group">

                            <label>

                                Trạng thái

                            </label>

                            <div class="radio-group">

                                <label class="radio-item">

                                    <input type="radio" name="status" value="active" checked>

                                    Đang hoạt động

                                </label>

                                <label class="radio-item">

                                    <input type="radio" name="status" value="hidden">

                                    Đã ẩn

                                </label>

                            </div>

                        </div>

                    </div>

                    <!-- ==========================
                            RIGHT
                    =========================== -->

                    <div class="form-right">

                        <div class="form-group">

                            <label>

                                Ảnh danh mục <span>*</span>

                            </label>

                            <div class="upload-wrapper">

                                <input type="file" id="categoryImage" accept="image/*" hidden>

                                <div class="image-preview" id="imagePreview">

                                    <img id="previewImg" src="" alt="" style="display:none;">

                                    <label for="categoryImage" class="upload-box" id="uploadBox">

                                        <i class="fa-solid fa-plus"></i>

                                        <span>Thêm ảnh</span>

                                    </label>

                                </div>

                                <small>

                                    Hỗ trợ JPG, PNG, WEBP (tối đa 2MB)

                                </small>

                            </div>

                        </div>

                    </div>

                </form>

                <!-- ==========================
                        BUTTONS
                =========================== -->

                <div class="form-actions">

                    <a href="category-management.html" class="back-btn">

                        Quay lại

                    </a>

                    <div class="right-actions">

                        <button type="button" id="deleteBtn" class="delete-btn">

                            Xóa danh mục

                        </button>

                        <button type="reset" class="cancel-btn">

                            Hủy

                        </button>

                        <button type="submit" form="categoryForm" class="save-btn">

                            Lưu danh mục

                        </button>

                    </div>

                </div>

            </section>
            <!-- ==========================
                    FOOTER
            =========================== -->

            <footer class="footer">

                <p>

                    © 2026 Jewelry Store. All rights reserved.

                </p>

            </footer>

        </main>

    </div>

    <!-- ==========================
            JAVASCRIPT
    =========================== -->

    <script src="../js/category-form.js"></script>

</body>

</html>

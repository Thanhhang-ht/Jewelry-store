<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Jewelry Store</title>

    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <h2>Jewelry Store</h2>
        </div>

        <nav class="menu">
            <a href="../html/index.html">Trang chủ</a>
            <a href="../html/products.html">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>

        <div class="right">

            <div class="search">
                <input type="text" placeholder="Tìm kiếm sản phẩm...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <a href="../html/cart.html">
                <i class="fa-solid fa-cart-shopping icon"></i>
            </a>

            <!-- USER ICON + MENU -->
            <div class="user-wrapper">
                <i class="fa-regular fa-user icon" id="userIcon"></i>

                <div class="user-menu" id="userMenu">
                    <a href="login.html">Đăng nhập</a>
                    <a href="register.html">Đăng ký</a>
                </div>
            </div>

        </div>
    </header>

    <!-- LOGIN -->
    <section class="login-container">

        <!-- LEFT -->
        <div class="login-left">

            <h1>Đăng nhập</h1>

            <p class="welcome">
                Chào mừng bạn quay lại
                <span>Jewelry Store</span>
            </p>

            <div class="form-group">
                <label>Email hoặc số điện thoại</label>
                <input type="text" id="email" placeholder="Nhập email hoặc số điện thoại">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>

                <div class="password-box">
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                    <i class="fa-regular fa-eye" id="togglePassword"></i>
                </div>
            </div>

            <div class="forgot">
                <a href="#" id="forgotPassword">Quên mật khẩu?</a>
            </div>

            <button class="login-btn" onclick="login()">
                ĐĂNG NHẬP
            </button>

            <!-- LINK REGISTER (QUAN TRỌNG CHO BACKEND FLOW) -->
            <p class="register-link">
                Bạn chưa có tài khoản?
                <a href="register.html">Đăng ký ngay</a>
            </p>

            <div class="divider">
                <span>Hoặc đăng nhập với</span>
            </div>

            <div class="social">
                <button class="google">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                    Google
                </button>

                <button class="facebook">
                    <i class="fa-brands fa-facebook"></i>
                    Facebook
                </button>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="login-right">
            <img src="../image/image_23.png" alt="Jewelry">
        </div>

    </section>

    <p class="copyright">
        © 2026 Jewelry Store. All rights reserved.
    </p>

    <script src="../js/login.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Jewelry Store</title>

    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <h2>Jewelry Store</h2>
        </div>

        <nav class="menu">
            <a href="../html/index.html">Trang chủ</a>
            <a href="../html/products.html">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>

        <div class="right">

            <div class="search">
                <input type="text" placeholder="Tìm kiếm...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <a href="cart.html">
                <i class="fa-solid fa-cart-shopping icon"></i>
            </a>

            <i class="fa-regular fa-user icon" id="userIcon"></i>

            <div class="user-menu" id="userMenu">
                <a href="login.html">Đăng nhập</a>
                <a href="register.html">Đăng ký</a>
            </div>

        </div>
    </header>

    <section class="register-container">

        <div class="register-left">

            <h1>Đăng ký</h1>

            <p class="welcome">
                Tạo tài khoản để trải nghiệm mua sắm tại
                <span>Jewelry Store</span>
            </p>

            <!-- FORM (chuẩn backend) -->
            <form id="registerForm">

                <div class="form-group">
                    <label>Họ và tên <span class="required">*</span></label>
                    <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Nhập email">
                </div>

                <div class="form-group">
                    <label>Số điện thoại <span class="required">*</span></label>
                    <input type="text" id="phone" name="phone" placeholder="Nhập số điện thoại">
                </div>

                <div class="form-group">
                    <label>Mật khẩu <span class="required">*</span></label>

                    <div class="password-box">
                        <input type="password" id="password" name="password" placeholder="Mật khẩu">
                        <i class="fa-regular fa-eye toggle"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nhập lại mật khẩu <span class="required">*</span></label>

                    <div class="password-box">
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            placeholder="Nhập lại mật khẩu">
                        <i class="fa-regular fa-eye toggle"></i>
                    </div>
                </div>

                <button type="submit" class="register-btn">
                    ĐĂNG KÝ
                </button>

            </form>

            <!-- SOCIAL LOGIN (GIỮ LẠI CHO SAU NÀY OAuth) -->
            <div class="divider">
                <span>Hoặc đăng ký với</span>
            </div>

            <div class="social">

                <button type="button" id="googleRegister" class="google">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                    Google
                </button>

                <button type="button" id="facebookRegister" class="facebook">
                    <i class="fa-brands fa-facebook"></i>
                    Facebook
                </button>

            </div>

            <!-- LINK LOGIN (QUAN TRỌNG) -->
            <p style="text-align:center; margin-top:20px;">
                Đã có tài khoản?
                <a href="login.html">Đăng nhập</a>
            </p>

        </div>

        <div class="register-right">
            <img src="../image/image_23.png" alt="Jewelry">
        </div>

    </section>

    <p class="copyright">
        © 2026 Jewelry Store. All rights reserved.
    </p>

    <script src="../js/register.js"></script>

</body>

</html>
